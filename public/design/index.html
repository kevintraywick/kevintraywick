<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Design Language Builder</title>
<meta name="description" content="Turn a design questionnaire into a printable design-language document for a new website." />

<!-- Jelly UI (dependency-free web components) -->
<script type="module" src="https://jelly-ui.com/package.js"></script>

<!-- Fonts used for live type previews / builder chrome -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=Baloo+2:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&family=Poppins:wght@500;600;700&family=Playfair+Display:wght@600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --pad: 20px;
    --radius: 20px;
    --shadow: 0 2px 0 rgba(0,0,0,.06), 0 10px 24px -12px rgba(0,0,0,.28);
    --accent: #7C5CFC;            /* cheerful selection color for radios/checkboxes/selects */
  }
  /* Cheerful (not green / not black) selection color across all form controls */
  jelly-checkbox, jelly-radio-group, jelly-radio, jelly-select, jelly-slider, jelly-switch {
    --jelly-accent: var(--accent);
    --jelly-fill: var(--accent);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: "Nunito", system-ui, sans-serif;
    color: #1c2530;
    background:
      radial-gradient(1200px 600px at 15% -10%, #fef6e7 0%, transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, #eaf7f0 0%, transparent 55%),
      #f7f4ee;
    line-height: 1.5;
  }
  jelly-theme[mode] { display: block; }

  /* ~25% denser overall to reduce scrolling */
  .wrap { max-width: 920px; margin: 0 auto; padding: 14px 20px 150px; zoom: 0.8; }

  header.hero {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 6px 4px 10px;
  }
  header.hero .eyebrow {
    font: 700 13px/1 "Nunito", sans-serif;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent);
  }
  .darktoggle { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; color: #55606c; cursor: pointer; }

  .card {
    background: #fffdf8;
    border: 2px solid #12203015;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin: 10px 0;
  }
  .section-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .section-num {
    font-family: "Fraunces", serif; font-weight: 700; font-size: 18px;
    color: var(--accent); min-width: 1.5em;
  }
  .section-head h2 {
    font-family: "Fraunces", serif; font-weight: 600; font-size: 20px; margin: 0;
  }

  .field { margin: 10px 0; }
  .field > label.flabel,
  .field > .flabel {
    display: block; font-weight: 700; font-size: 14px; margin-bottom: 8px; color: #26313d;
  }
  .hint { color: #77818d; font-weight: 500; font-size: 12.5px; margin-left: 6px; }

  .checks { display: flex; flex-wrap: wrap; gap: 7px 16px; }

  jelly-radio-group { display: flex; flex-wrap: wrap; gap: 6px 18px; }

  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }

  /* Color palette */
  .swatches { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  .swatch {
    border: 2px solid #12203018; border-radius: 16px; overflow: hidden; cursor: pointer;
    background: #fff; text-align: left; padding: 0; font: inherit; transition: transform .12s ease, box-shadow .12s ease;
  }
  .swatch:hover { transform: translateY(-2px); box-shadow: 0 8px 18px -10px rgba(0,0,0,.4); }
  .swatch .chip { height: 58px; width: 100%; display: block; }
  .swatch .meta { padding: 8px 10px 10px; }
  .swatch .role { font-weight: 700; font-size: 13px; }
  .swatch .hex { font-family: "JetBrains Mono", monospace; font-size: 11.5px; color: #6b7480; text-transform: uppercase; }
  .swatch input[type=color] { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }

  .presetbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .presetbar .flabel { margin: 0; }

  .scalerow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .scalechip {
    display: inline-flex; align-items: center; justify-content: center;
    background: #eaf7f0; color: #1c7a4f; font-family: "JetBrains Mono", monospace;
    font-size: 12px; font-weight: 600; border-radius: 8px; padding: 4px 8px;
  }
  .scaledemo { display: flex; align-items: flex-end; gap: 6px; margin-top: 10px; height: 44px; }
  .scaledemo span { background: #2ABC74; border-radius: 4px 4px 0 0; width: 14px; display: block; }

  .rangewrap { display: flex; align-items: center; gap: 14px; }
  .rangewrap output { font-family: "JetBrains Mono", monospace; font-size: 13px; min-width: 64px; color: #26313d; font-weight: 600; }

  .footer-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: #fffdf8ee; backdrop-filter: blur(8px);
    border-top: 2px solid #12203015;
    padding: 14px 20px; z-index: 20;
  }
  .footer-inner { max-width: 920px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .footer-inner .saved { color: #77818d; font-size: 13px; }

  .toplinks { display: flex; justify-content: center; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

  textarea.raw, input.raw {
    width: 100%; font: inherit; padding: 10px 12px; border-radius: 12px;
    border: 2px solid #12203020; background: #fff; color: inherit; resize: vertical;
  }
  textarea.raw:focus, input.raw:focus { outline: none; border-color: #2ABC74; }

  .principle { display: flex; gap: 10px; align-items: flex-start; margin: 10px 0; }
  .principle .num { font-family: "Fraunces", serif; font-weight: 700; color: #2ABC74; font-size: 18px; margin-top: 6px; }

  small.ex { display: block; color: #8a939e; font-size: 12px; margin-top: 6px; }

  /* Dark mode (toggled by the Dark switch) */
  body.dark { color: #e7ebf0; background:
      radial-gradient(1200px 600px at 15% -10%, #1d2130 0%, transparent 60%),
      radial-gradient(1000px 500px at 100% 0%, #16221c 0%, transparent 55%),
      #12151b; }
  body.dark .card { background: #1b1f27; border-color: #ffffff14; box-shadow: 0 2px 0 rgba(0,0,0,.3), 0 12px 26px -14px rgba(0,0,0,.7); }
  body.dark .section-head h2 { color: #f1f3f6; }
  body.dark .swatch { background: #1b1f27; border-color: #ffffff16; }
  body.dark textarea.raw, body.dark input.raw { background: #20242d; border-color: #ffffff22; color: #e7ebf0; }
  body.dark textarea.raw::placeholder, body.dark input.raw::placeholder { color: #8b95a3; }
  body.dark .darktoggle { color: #aeb6c2; }
  body.dark .scalechip { background: #24303a; color: #8fe3bd; }
  body.dark .swatch .hex { color: #9aa4b1; }
  body.dark .footer-bar { background: #12151beb; border-color: #ffffff14; }
  body.dark .footer-inner .saved { color: #8b95a3; }
  body.dark .rangewrap output { color: #e7ebf0; }
</style>
</head>
<body>
<jelly-theme mode="auto">
<div class="wrap">

  <header class="hero">
    <div class="eyebrow">Design Language Builder</div>
    <label class="darktoggle"><jelly-switch id="darkToggle" size="small"></jelly-switch><span>Dark</span></label>
  </header>

  <form id="dlForm">
    <div class="card" id="project-card">
      <div class="section-head"><span class="section-num">0</span><h2>Project</h2></div>
      <p class="blurb">What are we designing? This names the document.</p>
      <div class="field">
        <span class="flabel">Website / project name</span>
        <input class="raw" name="project_name" placeholder="e.g. Blackmoor — a Dungeons &amp; Dragons convention" />
      </div>
      <div class="field">
        <span class="flabel">One-line description <span class="hint">what it is, for whom</span></span>
        <input class="raw" name="project_desc" placeholder="e.g. A tabletop-fantasy event site that makes signing up feel like starting a campaign." />
      </div>
    </div>

    <div id="sections"></div>
  </form>

</div>

<div class="footer-bar">
  <div class="footer-inner">
    <span class="saved" id="savedNote">Changes save automatically to this browser.</span>
    <div style="display:flex; gap:10px;">
      <jelly-button id="resetBtn" variant="platinum" size="large" shape="square" type="button">Reset</jelly-button>
      <jelly-button id="genBtn" size="large" shape="square" type="button" style="--jelly-fill:#7C5CFC;">Create design language document →</jelly-button>
    </div>
  </div>
</div>
</jelly-theme>

<script>
/* ------------------------------------------------------------------ *
 *  Questionnaire config — the single source of truth for both the
 *  form and the generated document.
 * ------------------------------------------------------------------ */

const COLOR_PRESETS = {
  "Bright (default)": {
    Primary:"#2ABC74", Secondary:"#7C5CFC", Accent:"#F5A524", Background:"#F7F4EE",
    Surface:"#FFFDF8", Danger:"#E5484D", Success:"#30A46C", Info:"#3B82F6", Neutral:"#6B7480"
  },
  "Fantasy parchment": {
    Primary:"#2F7A54", Secondary:"#6C4AB6", Accent:"#C8951F", Background:"#F3E7CE",
    Surface:"#FBF3E1", Danger:"#B23A2E", Success:"#3E8E5A", Info:"#3E6BB0", Neutral:"#6B5E4A"
  },
  "Cool & modern": {
    Primary:"#3B82F6", Secondary:"#06B6D4", Accent:"#F59E0B", Background:"#F5F7FA",
    Surface:"#FFFFFF", Danger:"#EF4444", Success:"#10B981", Info:"#6366F1", Neutral:"#64748B"
  },
  "Warm & playful": {
    Primary:"#F5643C", Secondary:"#FF3D9A", Accent:"#FFC24B", Background:"#FFF6F0",
    Surface:"#FFFFFF", Danger:"#E11D48", Success:"#22C55E", Info:"#0EA5E9", Neutral:"#7A6E68"
  }
};
const COLOR_ROLES = ["Primary","Secondary","Accent","Background","Surface","Danger","Success","Info","Neutral"];

const SECTIONS = [
  { id:"principles", title:"Design principles", blurb:"Five or six rules that explain WHY decisions get made. These are the tie-breakers when a designer has several valid options. Edit to fit your project.",
    fields:[ { type:"principles", name:"principles", defaults:[
      "Fun first. The site should feel like the opening scene of an adventure, not a corporate event.",
      "Information stays obvious. Playfulness must never make key tasks harder to find.",
      "Delight through polish. Motion, illustration, and color create delight without slowing the experience.",
      "Consistency builds trust. Similar content always looks and behaves the same way.",
      "Accessible to everyone. High contrast, readable type, and responsive layouts are non-negotiable."
    ] } ] },

  { id:"personality", title:"Personality", blurb:"The most important section. Use emotional words, not visual ones — they drive hundreds of decisions.",
    fields:[ { type:"multi", name:"personality", options:["welcoming","adventurous","optimistic","handcrafted","imaginative","premium (not corporate)","magical (not gothic)","fun but organized","calm","bold","playful","trustworthy","professional","elegant","sophisticated","minimal","energetic","luxurious","approachable","quirky","modern","refined","cozy","confident"] },
             { type:"text", name:"personality_other", placeholder:"Other traits (comma separated)" } ] },

  { id:"audience", title:"Audience", blurb:"Who is visiting? This drives navigation and density.",
    fields:[ { type:"multi", name:"audience", options:["experienced users","first-timers","families","professionals","hobbyists","mostly desktop","mostly mobile","international"], defaults:["experienced users","first-timers","mostly desktop"] },
             { type:"text", name:"audience_notes", placeholder:"Age range, context of use, anything else" } ] },

  { id:"color", title:"Color system", blurb:"Choose a preset to start, then click any swatch to open a color picker and tune each role.",
    fields:[ { type:"colorset", name:"color" } ] },

  { id:"type", title:"Typography", blurb:"Pick roles, not just fonts.",
    fields:[
      { type:"select", name:"font_heading", label:"Heading font", options:["Fraunces","Playfair Display","Poppins","Baloo 2","Space Grotesk","Nunito","Inter"], default:"Fraunces" },
      { type:"select", name:"font_body", label:"Body font", options:["Nunito","Inter","Work Sans","Source Sans 3","Lato"], default:"Nunito" },
      { type:"select", name:"font_mono", label:"Monospace font", options:["JetBrains Mono","Fira Code","IBM Plex Mono","Menlo"], default:"JetBrains Mono" },
      { type:"range", name:"line_width", label:"Max line width (characters)", min:50, max:90, step:1, default:70, unit:"ch" }
    ] },

  { id:"spacing", title:"Spacing system", blurb:"A spacing scale everything is built from. Set the base step; the scale derives from it.",
    fields:[ { type:"scale", name:"spacing_base", options:[4,8], default:8 } ] },

  { id:"radius", title:"Corner radius", blurb:"Per-element radii instead of random values.",
    fields:[
      { type:"radio", name:"radius_style", options:[
          {value:"pill", label:"Pill / very round (buttons 999px, cards 24px)"},
          {value:"rounded", label:"Rounded (buttons 12px, cards 20px)"},
          {value:"soft", label:"Soft (buttons 8px, cards 12px)"},
          {value:"sharp", label:"Sharp (buttons 4px, cards 6px)"} ], default:"pill" }
    ] },

  { id:"shadows", title:"Shadows & elevation",
    fields:[ { type:"radio", name:"shadow_style", options:[
        {value:"layered", label:"Layered / tactile (a solid offset plus a soft blur)"},
        {value:"soft", label:"Soft & subtle"},
        {value:"flat", label:"Flat, borders only"} ], default:"layered" },
      { type:"radio", name:"outline", options:[
        {value:"thick", label:"Thick outlines (2px)"},
        {value:"thin", label:"Thin outlines (1px)"},
        {value:"none", label:"No outlines"} ], default:"thick" } ] },

  { id:"buttons", title:"Buttons", blurb:"Overall button character. (States: default, hover, pressed, focus, disabled, loading are all defined in the doc.)",
    fields:[ { type:"radio", name:"button_style", options:[
        {value:"filled-bounce", label:"Filled + bounce animation on press"},
        {value:"filled", label:"Filled, no bounce"},
        {value:"outline", label:"Outline / ghost primary"} ], default:"filled-bounce" } ] },

  { id:"forms", title:"Forms", blurb:"How inputs feel.",
    fields:[ { type:"radio", name:"form_style", options:[
        {value:"filled", label:"Filled fields (surface background)"},
        {value:"outline", label:"Outlined fields"},
        {value:"underline", label:"Underline only"} ], default:"filled" },
      { type:"multi", name:"form_features", options:["inline validation","required-field markers","helper text","clear error messages","floating labels"], defaults:["inline validation","required-field markers","clear error messages"] } ] },

  { id:"cards", title:"Cards", blurb:"Almost every page uses cards.",
    fields:[ { type:"radio", name:"card_style", options:[
        {value:"raised", label:"Raised with layered shadow + hover lift"},
        {value:"bordered", label:"Bordered, flat"},
        {value:"tinted", label:"Tinted surface, no border"} ], default:"raised" } ] },

  { id:"icons", title:"Icons", blurb:"One icon style, used everywhere.",
    fields:[ { type:"radio", name:"icon_style", options:[
        {value:"outline", label:"Outline"}, {value:"filled", label:"Filled"},
        {value:"cartoon", label:"Cartoon"}, {value:"hand-drawn", label:"Hand-drawn"},
        {value:"3d", label:"3D / soft"} ], default:"outline" } ] },

  { id:"illustration", title:"Illustrations", blurb:"Huge for consistency. Describe the art direction.",
    fields:[ { type:"multi", name:"illustration", options:["whimsical / fantasy","not realistic","slightly exaggerated","colorful","painterly textures","flat vector","line art","no AI-looking art"], defaults:["whimsical / fantasy","slightly exaggerated","colorful","no AI-looking art"] },
      { type:"text", name:"illustration_notes", placeholder:"Motifs: e.g. maps, dice, spellbooks, parchment, monsters…" } ] },

  { id:"photography", title:"Photography", blurb:"If photos are used, define the look.",
    fields:[ { type:"multi", name:"photography", options:["candid","event / documentary","studio shots","cosplay / costumed","product shots","no photography"], defaults:["candid","event / documentary"] } ] },

  { id:"motion", title:"Motion", blurb:"A big amateur-vs-professional divide.",
    fields:[
      { type:"range", name:"motion_speed", label:"Base transition speed", min:120, max:400, step:20, default:220, unit:"ms" },
      { type:"radio", name:"easing", options:[
        {value:"spring", label:"Springy / bouncy"},
        {value:"ease-out", label:"Smooth ease-out"},
        {value:"linear", label:"Minimal / linear"} ], default:"spring" },
      { type:"multi", name:"motion_uses", options:["hover effects","page transitions","button press bounce","scroll reveals","honor reduced-motion"], defaults:["hover effects","button press bounce","honor reduced-motion"] } ] },

  { id:"layout", title:"Layout & grid", blurb:"Container widths, columns, and rhythm.",
    fields:[
      { type:"select", name:"container_max", label:"Max container width", options:["1120px","1200px","1280px","1440px"], default:"1200px" },
      { type:"radio", name:"grid_cols", options:[
        {value:"12", label:"12-column grid"}, {value:"8", label:"8-column grid"},
        {value:"single", label:"Single centered column"} ], default:"12" } ] },

  { id:"responsive", title:"Responsive behavior", blurb:"Concrete rules beat “make it responsive.”",
    fields:[ { type:"radio", name:"card_cols", options:[
        {value:"3-2-1", label:"Cards: 3 desktop → 2 tablet → 1 phone"},
        {value:"4-2-1", label:"Cards: 4 desktop → 2 tablet → 1 phone"},
        {value:"2-1", label:"Cards: 2 desktop → 1 phone"} ], default:"3-2-1" },
      { type:"multi", name:"responsive_features", options:["hamburger menu on phone","larger touch targets on phone","sticky CTA on phone"], defaults:["hamburger menu on phone","larger touch targets on phone"] } ] },

  { id:"nav", title:"Navigation", blurb:"How people move around.",
    fields:[ { type:"radio", name:"nav_type", options:[
        {value:"sticky", label:"Sticky top bar"}, {value:"static", label:"Static top bar"},
        {value:"mega", label:"Mega menu"} ], default:"sticky" },
      { type:"multi", name:"nav_features", options:["breadcrumbs","search","dropdowns","persistent CTA button"], defaults:["persistent CTA button"] } ] },

  { id:"a11y", title:"Accessibility", blurb:"Non-negotiable. These stay checked unless you have a reason.",
    fields:[ { type:"multi", name:"a11y", options:["WCAG AA contrast","full keyboard navigation","visible focus indicators","screen-reader labels","44px minimum touch targets","respects reduced-motion"], defaults:["WCAG AA contrast","full keyboard navigation","visible focus indicators","screen-reader labels","44px minimum touch targets","respects reduced-motion"] } ] },

  { id:"tone", title:"Content tone", blurb:"Gives writers a consistent voice.",
    fields:[ { type:"radio", name:"tone", options:[
        {value:"fantasy", label:"Fantasy / adventurous"}, {value:"funny", label:"Funny / casual"},
        {value:"epic", label:"Epic / cinematic"}, {value:"professional", label:"Professional / clear"},
        {value:"warm", label:"Warm / friendly"} ], default:"fantasy" },
      { type:"text", name:"voice_statement", placeholder:"One-line voice, e.g. “Professional event organization with the excitement of a new campaign.”" } ] },

  { id:"components", title:"Components", blurb:"Every reusable piece the site will need.",
    fields:[ { type:"multi", name:"components", options:["hero banner","FAQ","speaker card","schedule card","event card","countdown timer","registration button","sponsor logos","callouts","testimonials","pricing table","maps","footer","newsletter signup"], defaults:["hero banner","FAQ","event card","registration button","footer"] } ] }
];

/* ------------------------------------------------------------------ *
 *  Render the form from config
 * ------------------------------------------------------------------ */
const root = document.getElementById("sections");
const form = document.getElementById("dlForm");
let sectionCount = 0;

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }

SECTIONS.forEach(sec => {
  sectionCount++;
  const card = document.createElement("div");
  card.className = "card";
  card.id = "sec-" + sec.id;
  let html = `<div class="section-head"><span class="section-num">${sectionCount}</span><h2>${esc(sec.title)}</h2></div>`;
  sec.fields.forEach(f => { html += renderField(f); });
  card.innerHTML = html;
  root.appendChild(card);
});

function renderField(f){
  if (f.type === "multi") {
    return `<div class="field"><span class="flabel">Select all that apply</span><div class="checks">` +
      f.options.map(o => {
        const val = typeof o === "string" ? o : o.value;
        const lab = typeof o === "string" ? o : o.label;
        return `<jelly-checkbox size="small" name="${esc(f.name)}" value="${esc(val)}">${esc(lab)}</jelly-checkbox>`;
      }).join("") + `</div></div>`;
  }
  if (f.type === "radio") {
    return `<div class="field"><jelly-radio-group size="small" name="${esc(f.name)}" value="${esc(f.default||"")}">` +
      f.options.map(o => `<jelly-radio size="small" value="${esc(o.value)}">${esc(o.label)}</jelly-radio>`).join("") +
      `</jelly-radio-group></div>`;
  }
  if (f.type === "select") {
    return `<div class="field grid-item"><span class="flabel">${esc(f.label||f.name)}</span>` +
      `<jelly-select size="small" name="${esc(f.name)}" value="${esc(f.default||"")}">` +
      f.options.map(o => `<jelly-option value="${esc(o)}"${o===f.default?" selected":""}>${esc(o)}</jelly-option>`).join("") +
      `</jelly-select></div>`;
  }
  if (f.type === "range") {
    return `<div class="field"><span class="flabel">${esc(f.label||f.name)}</span>` +
      `<div class="rangewrap"><jelly-slider style="flex:1" name="${esc(f.name)}" min="${f.min}" max="${f.max}" step="${f.step}" value="${f.default}"></jelly-slider>` +
      `<output data-out="${esc(f.name)}">${f.default}${esc(f.unit||"")}</output></div></div>`;
  }
  if (f.type === "text") {
    return `<div class="field"><input class="raw" name="${esc(f.name)}" placeholder="${esc(f.placeholder||"")}" /></div>`;
  }
  if (f.type === "colorset") {
    return `<div class="field">
      <div class="presetbar"><span class="flabel">Start from a palette</span>
        <jelly-radio-group size="small" id="palettePreset" name="palette_preset" value="Bright (default)">` +
        Object.keys(COLOR_PRESETS).map(p => `<jelly-radio value="${esc(p)}">${esc(p)}</jelly-radio>`).join("") +
      `</jelly-radio-group></div>
      <div class="swatches" id="swatches"></div>
      <small class="ex">Click a swatch to open the color picker for that role.</small>
    </div>`;
  }
  if (f.type === "scale") {
    return `<div class="field">
      <span class="flabel">Base step</span>
      <jelly-radio-group name="${esc(f.name)}" value="${f.default}">` +
        f.options.map(o => `<jelly-radio value="${o}">${o}px base</jelly-radio>`).join("") +
      `</jelly-radio-group>
      <div class="scalerow" id="scalerow" style="margin-top:12px"></div>
      <div class="scaledemo" id="scaledemo"></div>
    </div>`;
  }
  if (f.type === "principles") {
    return `<div class="field" id="principles-field">` +
      f.defaults.map((p,i) => `<div class="principle"><span class="num">${i+1}</span><textarea class="raw" rows="2" name="principle_${i}">${esc(p)}</textarea></div>`).join("") +
      `</div>`;
  }
  return "";
}

/* ---- Color swatches + picker ---- */
const swatchWrap = document.getElementById("swatches");
let colorState = { ...COLOR_PRESETS["Bright (default)"] };

function paintSwatches(){
  swatchWrap.innerHTML = COLOR_ROLES.map(role => `
    <button type="button" class="swatch" data-role="${role}">
      <span class="chip" style="background:${colorState[role]}"></span>
      <span class="meta"><span class="role">${role}</span><br><span class="hex">${colorState[role]}</span></span>
      <input type="color" name="color_${slug(role)}" value="${colorState[role]}" />
    </button>`).join("");
  swatchWrap.querySelectorAll(".swatch").forEach(btn => {
    const input = btn.querySelector("input[type=color]");
    btn.addEventListener("click", e => { if (e.target !== input) input.click(); });
    input.addEventListener("input", () => {
      const role = btn.dataset.role;
      colorState[role] = input.value;
      btn.querySelector(".chip").style.background = input.value;
      btn.querySelector(".hex").textContent = input.value.toUpperCase();
      save();
    });
  });
}
paintSwatches();

/* ---- Spacing scale live preview ---- */
function renderScale(base){
  base = Number(base) || 8;
  const scale = base === 4 ? [4,8,12,16,24,32,48,64,96] : [8,16,24,32,48,64,96,128];
  const row = document.getElementById("scalerow");
  const demo = document.getElementById("scaledemo");
  if (row) row.innerHTML = scale.map(n => `<span class="scalechip">${n}</span>`).join("");
  if (demo) demo.innerHTML = scale.map(n => `<span style="height:${Math.min(n,44)}px" title="${n}px"></span>`).join("");
  return scale;
}
renderScale(8);

/* ------------------------------------------------------------------ *
 *  Wiring: presets, live outputs, autosave
 * ------------------------------------------------------------------ */
document.addEventListener("input", handleChange);
document.addEventListener("change", handleChange);

function handleChange(e){
  const t = e.target;
  if (!t) return;
  const name = t.getAttribute && t.getAttribute("name");

  // range output
  if (t.tagName && t.tagName.toLowerCase() === "jelly-slider" && name){
    const out = document.querySelector(`output[data-out="${name}"]`);
    const field = SECTIONS.flatMap(s=>s.fields).find(f=>f.name===name);
    if (out) out.textContent = (t.value ?? "") + (field?.unit||"");
  }
  // palette preset
  if (name === "palette_preset" && COLOR_PRESETS[t.value]){
    colorState = { ...COLOR_PRESETS[t.value] };
    paintSwatches();
  }
  // spacing base
  if (name === "spacing_base"){ renderScale(t.value); }

  save();
}

/* ------------------------------------------------------------------ *
 *  Persistence
 * ------------------------------------------------------------------ */
const KEY = "design_language_builder_v1";

function harvest(){
  const data = {};
  const push = (k,v) => { if (data[k]===undefined) data[k]=v; else { if(!Array.isArray(data[k])) data[k]=[data[k]]; data[k].push(v); } };
  try {
    const fd = new FormData(form);
    for (const [k,v] of fd.entries()) push(k, v);
  } catch(_) {}
  // Fallback for any named control FormData missed (belt-and-suspenders for web components)
  form.querySelectorAll("[name]").forEach(el => {
    const n = el.getAttribute("name"); if (!n) return;
    const tag = (el.tagName||"").toLowerCase();
    if (tag === "jelly-checkbox" || el.type === "checkbox"){
      if (el.checked && !arrHas(data,n,el.getAttribute("value")||"on")) push(n, el.getAttribute("value")||"on");
    } else if (data[n]===undefined){
      const v = el.value ?? el.getAttribute("value");
      if (v!=null && v!=="") data[n]=v;
    }
  });
  // color roles from state (authoritative)
  data._colors = { ...colorState };
  return data;
}
function arrHas(data,k,v){ const d=data[k]; return d===v || (Array.isArray(d)&&d.includes(v)); }

function save(){
  try {
    localStorage.setItem(KEY, JSON.stringify(harvest()));
    const n = document.getElementById("savedNote");
    if (n){ n.textContent = "Saved ✓"; clearTimeout(save._t); save._t = setTimeout(()=>{ n.textContent = "Changes save automatically to this browser."; }, 1200); }
  } catch(_){}
}

function restore(){
  let data; try { data = JSON.parse(localStorage.getItem(KEY)||"null"); } catch(_){ return; }
  if (!data) return;
  // colors
  if (data._colors){ colorState = { ...colorState, ...data._colors }; paintSwatches(); }
  // set simple named controls
  Object.keys(data).forEach(name => {
    if (name.startsWith("_")) return;
    const val = data[name];
    const els = form.querySelectorAll(`[name="${CSS.escape(name)}"]`);
    if (!els.length) return;
    els.forEach(el => {
      const tag = (el.tagName||"").toLowerCase();
      if (tag === "jelly-checkbox" || el.type === "checkbox"){
        const want = Array.isArray(val) ? val : [val];
        el.checked = want.includes(el.getAttribute("value"));
      } else if (tag === "jelly-radio-group" || tag === "jelly-select" || tag === "jelly-slider"){
        el.setAttribute("value", val); el.value = val;
      } else {
        el.value = val;
      }
    });
  });
  // refresh derived views
  if (data.spacing_base) renderScale(data.spacing_base);
  document.querySelectorAll("jelly-slider[name]").forEach(sl => {
    const out = document.querySelector(`output[data-out="${sl.getAttribute("name")}"]`);
    const field = SECTIONS.flatMap(s=>s.fields).find(f=>f.name===sl.getAttribute("name"));
    if (out) out.textContent = (sl.getAttribute("value")||"") + (field?.unit||"");
  });
}
// restore after components upgrade
customElements.whenDefined("jelly-radio-group").then(() => setTimeout(restore, 60)).catch(()=>setTimeout(restore,300));
setTimeout(restore, 600); // fallback if jelly never loads

/* ------------------------------------------------------------------ *
 *  Reset
 * ------------------------------------------------------------------ */
document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Clear all answers and reset to defaults?")) return;
  localStorage.removeItem(KEY);
  location.reload();
});

/* ------------------------------------------------------------------ *
 *  Dark mode toggle (switches the Jelly theme + page chrome)
 * ------------------------------------------------------------------ */
const DARK_KEY = "design_language_dark_v1";
const themeEl = document.querySelector("jelly-theme");
const darkToggle = document.getElementById("darkToggle");
function applyDark(on){
  if (themeEl) themeEl.setAttribute("mode", on ? "dark" : "light");
  document.body.classList.toggle("dark", on);
  document.documentElement.style.colorScheme = on ? "dark" : "light";
}
function lsGet(k){ try { return localStorage.getItem(k); } catch(_){ return null; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(_){} }
(function initDark(){
  const on = lsGet(DARK_KEY) === "1";
  applyDark(on);
  function wire(){
    if (!darkToggle) return;
    if (on){ darkToggle.setAttribute("checked",""); darkToggle.checked = true; }
    darkToggle.addEventListener("change", () => {
      const isOn = darkToggle.checked;
      applyDark(isOn);
      lsSet(DARK_KEY, isOn ? "1" : "0");
    });
  }
  customElements.whenDefined("jelly-switch").then(() => setTimeout(wire, 40)).catch(wire);
  setTimeout(wire, 700); // fallback if jelly never loads
})();

/* ------------------------------------------------------------------ *
 *  Click a selected radio again to deselect it (all radio groups)
 * ------------------------------------------------------------------ */
document.addEventListener("click", (e) => {
  const radio = e.target.closest && e.target.closest("jelly-radio");
  if (!radio) return;
  const group = radio.closest("jelly-radio-group");
  if (!group) return;
  const rv = radio.getAttribute("value");
  const cur = (group.value != null && group.value !== "") ? group.value : group.getAttribute("value");
  if (cur === rv) {
    // already selected -> clear after Jelly finishes handling the click
    setTimeout(() => {
      try { group.value = ""; } catch(_){}
      group.setAttribute("value", "");
      group.querySelectorAll("jelly-radio").forEach(r => { try { r.checked = false; } catch(_){} r.removeAttribute("checked"); r.removeAttribute("aria-checked"); });
      group.dispatchEvent(new Event("change", { bubbles: true }));
      save();
    }, 0);
  }
}, true);

/* ------------------------------------------------------------------ *
 *  Generate printable design-language document
 * ------------------------------------------------------------------ */
document.getElementById("genBtn").addEventListener("click", generateDoc);

function fmt(val, fallback){
  if (val===undefined || val===null || val==="") return fallback || "—";
  if (Array.isArray(val)) return val.join(", ");
  return String(val);
}
function labelFor(sectionId, fieldName, value){
  const field = SECTIONS.find(s=>s.id===sectionId)?.fields.find(f=>f.name===fieldName);
  if (field && field.options && field.options[0] && typeof field.options[0] === "object"){
    const opt = field.options.find(o=>o.value===value); return opt?opt.label:value;
  }
  return value;
}

function generateDoc(){
  const d = harvest();
  const name = fmt(d.project_name, "Untitled project");
  const desc = fmt(d.project_desc, "");
  const colors = d._colors || colorState;
  const scale = (Number(d.spacing_base)===4)
    ? [4,8,12,16,24,32,48,64,96] : [8,16,24,32,48,64,96,128];
  const radiusMap = {
    pill:{Buttons:"999px",Cards:"24px",Inputs:"16px",Images:"20px"},
    rounded:{Buttons:"12px",Cards:"20px",Inputs:"12px",Images:"16px"},
    soft:{Buttons:"8px",Cards:"12px",Inputs:"8px",Images:"10px"},
    sharp:{Buttons:"4px",Cards:"6px",Inputs:"4px",Images:"4px"}
  }[d.radius_style || "pill"];

  const principles = [];
  Object.keys(d).filter(k=>k.startsWith("principle_")).sort().forEach(k=>{ if(d[k]&&d[k].trim()) principles.push(d[k].trim()); });

  const fontH = fmt(d.font_heading,"Fraunces"), fontB = fmt(d.font_body,"Nunito"), fontM = fmt(d.font_mono,"JetBrains Mono");
  const gf = enc => enc.replace(/ /g,"+");
  const fontLink = `https://fonts.googleapis.com/css2?family=${gf(fontH)}:wght@400;600;700&family=${gf(fontB)}:wght@400;600;700&family=${gf(fontM)}&display=swap`;

  const swatchRow = COLOR_ROLES.map(role => `
    <div class="sw">
      <div class="chip" style="background:${colors[role]||"#ccc"}"></div>
      <div class="lab"><strong>${role}</strong><br><code>${(colors[role]||"").toUpperCase()}</code></div>
    </div>`).join("");

  const personality = fmt([].concat(d.personality||[], d.personality_other?[d.personality_other]:[]).filter(Boolean), "—");

  function block(title, body){ return `<section class="dl"><h2>${title}</h2>${body}</section>`; }
  function kv(rows){ return `<table class="kv">${rows.map(([k,v])=>`<tr><th>${k}</th><td>${v}</td></tr>`).join("")}</table>`; }

  const doc = `<!doctype html><html lang="en"><head><meta charset="utf-8">
  <title>${esc(name)} — Design Language</title>
  <link href="${fontLink}" rel="stylesheet">
  <style>
    :root{ --h:'${esc(fontH)}',serif; --b:'${esc(fontB)}',system-ui,sans-serif; --m:'${esc(fontM)}',monospace;
      --primary:${colors.Primary}; --bg:${colors.Background}; --surface:${colors.Surface}; }
    *{box-sizing:border-box;}
    body{ font-family:var(--b); color:#1c2530; margin:0; background:#fff; line-height:1.55; }
    .page{ max-width:820px; margin:0 auto; padding:56px 48px; }
    h1,h2,h3{ font-family:var(--h); }
    .cover{ min-height:70vh; display:flex; flex-direction:column; justify-content:center; padding:64px 48px;
      background:var(--bg); border-bottom:6px solid var(--primary); }
    .cover .kicker{ font:700 13px/1 var(--b); letter-spacing:.16em; text-transform:uppercase; color:var(--primary); }
    .cover h1{ font-size:52px; margin:12px 0 8px; letter-spacing:-.01em; }
    .cover p{ font-size:19px; max-width:60ch; color:#3a4552; }
    section.dl{ padding:26px 0; border-top:1px solid #e6e2d8; }
    section.dl:first-of-type{ border-top:none; }
    h2{ font-size:26px; margin:0 0 14px; color:#1c2530; }
    h2::before{ content:""; display:inline-block; width:10px; height:10px; border-radius:3px; background:var(--primary); margin-right:10px; vertical-align:middle; }
    table.kv{ border-collapse:collapse; width:100%; }
    table.kv th{ text-align:left; width:34%; vertical-align:top; padding:7px 12px 7px 0; color:#5b6672; font-weight:700; font-size:14px; }
    table.kv td{ padding:7px 0; vertical-align:top; }
    .palette{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .sw{ display:flex; gap:10px; align-items:center; }
    .sw .chip{ width:44px; height:44px; border-radius:10px; border:1px solid #0002; flex:none; }
    .sw code{ font-family:var(--m); font-size:12px; color:#6b7480; }
    .scale{ display:flex; align-items:flex-end; gap:8px; }
    .scale b{ background:var(--primary); border-radius:4px 4px 0 0; display:flex; align-items:flex-end; justify-content:center;
      color:#fff; font:600 10px/1 var(--m); padding-bottom:3px; }
    .radii{ display:flex; gap:14px; flex-wrap:wrap; }
    .radii .r{ text-align:center; font-size:13px; }
    .radii .r i{ display:block; width:70px; height:44px; background:var(--primary); margin-bottom:6px; }
    ul.tags{ list-style:none; padding:0; margin:0; display:flex; flex-wrap:wrap; gap:8px; }
    ul.tags li{ background:var(--bg); border:1.5px solid var(--primary); color:#243; border-radius:999px; padding:4px 12px; font-size:13px; font-weight:600; }
    ol.principles{ padding-left:0; list-style:none; counter-reset:p; }
    ol.principles li{ counter-increment:p; padding:8px 0 8px 44px; position:relative; }
    ol.principles li::before{ content:counter(p); position:absolute; left:0; top:6px; width:30px; height:30px; background:var(--primary);
      color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--h); font-weight:700; }
    .type-sample .h{ font-family:var(--h); font-weight:700; font-size:34px; }
    .type-sample .p{ font-family:var(--b); font-size:16px; max-width:60ch; }
    .type-sample .m{ font-family:var(--m); font-size:14px; background:#f4f2ec; padding:8px 10px; border-radius:8px; display:inline-block; }
    .printbar{ position:fixed; top:16px; right:16px; }
    .printbar button{ font:600 14px var(--b); background:var(--primary); color:#fff; border:none; border-radius:999px; padding:10px 18px; cursor:pointer; box-shadow:0 6px 16px -6px #0006; }
    @media print{ .printbar{ display:none; } .cover{ min-height:auto; } .page,.cover{ padding:28px 24px; } section.dl{ break-inside:avoid; } }
  </style></head><body>
  <div class="printbar"><button onclick="window.print()">Save as PDF / Print</button></div>
  <div class="cover">
    <div class="kicker">Design Language</div>
    <h1>${esc(name)}</h1>
    <p>${esc(desc)}</p>
  </div>
  <div class="page">
    ${principles.length ? block("Design principles", `<ol class="principles">${principles.map(p=>`<li>${esc(p)}</li>`).join("")}</ol>`) : ""}

    ${block("Personality", `<ul class="tags">${personality.split(", ").filter(Boolean).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>`)}

    ${block("Audience", kv([
      ["Who", fmt(d.audience)],
      ["Notes", fmt(d.audience_notes,"—")]
    ]))}

    ${block("Color system", `<div class="palette">${swatchRow}</div>`)}

    ${block("Typography", `
      <table class="kv">
        <tr><th>Heading font</th><td>${esc(fontH)}</td></tr>
        <tr><th>Body font</th><td>${esc(fontB)}</td></tr>
        <tr><th>Monospace</th><td>${esc(fontM)}</td></tr>
        <tr><th>Max line width</th><td>${fmt(d.line_width,"70")}ch</td></tr>
      </table>
      <div class="type-sample" style="margin-top:14px">
        <div class="h">${esc(fontH)} — the quest begins</div>
        <p class="p">${esc(fontB)} body copy: readable, comfortable, and set to a sensible measure so long passages never tire the reader.</p>
        <span class="m">${esc(fontM)} — code / labels 0123</span>
      </div>`)}

    ${block("Spacing system", `<p>Base step <strong>${fmt(d.spacing_base,"8")}px</strong>. Everything is built from this scale:</p>
      <div class="scale">${scale.map(n=>`<b style="height:${Math.min(n,88)}px;width:${Math.max(18,n/2)}px">${n}</b>`).join("")}</div>`)}

    ${block("Corner radius", `<div class="radii">${Object.entries(radiusMap).map(([k,v])=>`<div class="r"><i style="border-radius:${v}"></i>${k}<br><code>${v}</code></div>`).join("")}</div>`)}

    ${block("Shadows & outlines", kv([
      ["Shadow style", labelFor("shadows","shadow_style",d.shadow_style)],
      ["Outline", labelFor("shadows","outline",d.outline)]
    ]))}

    ${block("Buttons", kv([["Style", labelFor("buttons","button_style",d.button_style)],
      ["States to define", "default · hover · pressed · focus · disabled · loading"]]))}

    ${block("Forms", kv([["Field style", labelFor("forms","form_style",d.form_style)],
      ["Features", fmt(d.form_features)]]))}

    ${block("Cards", kv([["Style", labelFor("cards","card_style",d.card_style)]]))}

    ${block("Icons", kv([["Style", labelFor("icons","icon_style",d.icon_style)]]))}

    ${block("Illustrations", `<ul class="tags">${fmt(d.illustration,"").split(", ").filter(Boolean).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>
      <p style="margin-top:10px">${d.illustration_notes?("Motifs: "+esc(d.illustration_notes)):""}</p>`)}

    ${block("Photography", `<ul class="tags">${fmt(d.photography,"—").split(", ").filter(Boolean).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>`)}

    ${block("Motion", kv([
      ["Base speed", fmt(d.motion_speed,"220")+"ms"],
      ["Easing", labelFor("motion","easing",d.easing)],
      ["Used for", fmt(d.motion_uses)]
    ]))}

    ${block("Layout & grid", kv([
      ["Max container", fmt(d.container_max,"1200px")],
      ["Grid", labelFor("layout","grid_cols",d.grid_cols)]
    ]))}

    ${block("Responsive behavior", kv([
      ["Card columns", labelFor("responsive","card_cols",d.card_cols)],
      ["Phone rules", fmt(d.responsive_features)]
    ]))}

    ${block("Navigation", kv([
      ["Type", labelFor("nav","nav_type",d.nav_type)],
      ["Features", fmt(d.nav_features)]
    ]))}

    ${block("Accessibility", `<ul class="tags">${fmt(d.a11y,"—").split(", ").filter(Boolean).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>`)}

    ${block("Content tone", kv([
      ["Tone", labelFor("tone","tone",d.tone)],
      ["Voice", fmt(d.voice_statement,"—")]
    ]))}

    ${block("Components", `<ul class="tags">${fmt(d.components,"—").split(", ").filter(Boolean).map(t=>`<li>${esc(t)}</li>`).join("")}</ul>`)}

    <section class="dl" style="color:#8a939e;font-size:12px">Generated by the Design Language Builder · kevintraywick.com/design</section>
  </div>
  </body></html>`;

  const w = window.open("", "_blank");
  if (!w){ alert("Please allow pop-ups to open the generated document."); return; }
  w.document.open(); w.document.write(doc); w.document.close();
}
</script>
</body>
