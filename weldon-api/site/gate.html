<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>160Weldon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: linear-gradient(170deg, #46536A 0%, #5B6880 55%, #6E7A8E 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 34px; padding: 24px;
    font-family: "Bricolage Grotesque", "Avenir Next", sans-serif;
  }
  h1 {
    color: #FAFAF7; font-weight: 800; letter-spacing: -0.02em;
    font-size: clamp(44px, 8vw, 84px); line-height: .98;
    text-shadow: 0 2px 24px rgba(24,29,38,.35);
    user-select: none;
  }
  .dots { display: flex; gap: 12px; height: 14px; }
  .dots i {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1.5px solid rgba(250,250,247,.65); background: transparent;
    transition: background .15s;
  }
  .dots i.on { background: #FAFAF7; }
  .grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    width: min(92vw, 440px);
  }
  .grid button {
    aspect-ratio: 1; border: none; border-radius: 12px; cursor: pointer;
    background: rgba(250,250,247,.10);
    font-size: clamp(34px, 8vw, 52px); line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s, transform .08s;
    -webkit-tap-highlight-color: transparent;
  }
  .grid button:hover { background: rgba(250,250,247,.22); }
  .grid button:active { transform: scale(.92); }
  .grid button.picked { background: rgba(250,250,247,.38); }
  .grid.shake { animation: shake .4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-9px); } 40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); } 80% { transform: translateX(4px); }
  }
  .hint { color: rgba(250,250,247,.55); font-size: 14px; min-height: 20px; font-weight: 500; }
  @media (prefers-reduced-motion: reduce) { .grid.shake { animation: none; } }
</style>
</head>
<body>
  <h1>160Weldon</h1>
  <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
  <div class="grid" id="grid" role="group" aria-label="Pick three, top to bottom"></div>
  <p class="hint" id="hint"></p>

<script>
(function () {
  const EMOJIS = ['🏠','🌙','🌳','🐓',
                  '🛶','🎣','⭐','🦌',
                  '🐝','🔨','🪐','🚪',
                  '☕','🍄','🦉','🗝️'];
  const grid = document.getElementById('grid');
  const dots = document.querySelectorAll('.dots i');
  const hint = document.getElementById('hint');
  let picks = [], busy = false;

  EMOJIS.forEach(e => {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = e;
    b.setAttribute('aria-label', e);
    b.onclick = () => pick(e, b);
    grid.appendChild(b);
  });

  function reset() {
    picks = [];
    dots.forEach(d => d.classList.remove('on'));
    grid.querySelectorAll('button').forEach(b => b.classList.remove('picked'));
  }

  async function pick(e, btn) {
    if (busy) return;
    picks.push(e);
    btn.classList.add('picked');
    dots[picks.length - 1].classList.add('on');
    if (picks.length < 3) return;

    busy = true;
    try {
      const r = await fetch('/api/gate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ picks }),
      });
      if (r.ok) { location.replace('/'); return; }
      if (r.status === 429) hint.textContent = 'Too many tries — wait a few minutes.';
      else hint.textContent = '';
    } catch { hint.textContent = 'Connection hiccup — try again.'; }
    grid.classList.add('shake');
    setTimeout(() => { grid.classList.remove('shake'); reset(); busy = false; }, 450);
  }
})();
</script>
</body>
</html>
