<script>
(async function () {
  const { D } = W;

  const STATUS_LABEL = { done: 'Completed', progress: 'In progress', blocked: 'Blocked', open: 'Open' };
  const STATUS_OPTIONS = ['In progress', 'Open', 'Blocked', 'Completed', 'Remove'];
  const PRIO_ORDER = { high: 0, medium: 1, low: 2, 'nice to have': 3, '': 4, done: 5 };
  const PRIO_SYMBOL = { high: '!!', medium: '@', low: '-', 'nice to have': '-' };

  function keyFor(t) { return (t.where || '').toLowerCase().trim() + '::' + t.task.toLowerCase().trim(); }
  function escAttr(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;'); }

  // "all" was its own room pane, redundant with the blank-room fallback —
  // both mean "no specific room", so they merge into one General pane.
  function roomOf(t) {
    const w = (t.where || '').toLowerCase().trim();
    return (!w || w === 'all') ? 'general' : t.where;
  }

  // status overrides persist server-side, keyed by room+task text since the
  // record-book seed has no stable row id
  let overrides = {};
  const hasApi = await WAPI.health();
  if (hasApi) {
    try { (await WAPI.get('/todo-status')).forEach(o => { overrides[o.key] = o.status; }); } catch {}
  }

  function statusOf(t, key) {
    const raw = overrides[key];
    const s = (raw != null ? raw : (t.status || '')).toLowerCase();
    if (s === 'remove') return 'removed';
    if (s === 'completed') return 'done';
    if (s === 'in progress') return 'progress';
    if (s === 'blocked') return 'blocked';
    if (raw == null && (t.priority || '').toLowerCase() === 'done') return 'done'; // legacy seed rows marked done via priority
    return 'open';
  }

  // "removed" tasks stay in the record-book seed (there's no real delete for
  // seed data) but are hidden everywhere once the override says so
  function buildTasks() {
    return D.todo.map(t => {
      const key = keyFor(t);
      return { ...t, key, st: statusOf(t, key), room: roomOf(t) };
    }).filter(t => t.st !== 'removed');
  }

  const statusEl = document.getElementById('proj-status');
  function say(msg, cls) { statusEl.textContent = msg; statusEl.className = 'statusline ' + (cls || ''); }
  if (!hasApi) say('Backend offline — status changes won\'t be saved right now.');

  function updateSummary(tasks) {
    const open = tasks.filter(t => t.st !== 'done');
    const high = open.filter(t => (t.priority || '').toLowerCase() === 'high');
    document.getElementById('proj-summary').textContent =
      open.length + ' open, ' + high.length + ' high priority, ' + (tasks.length - open.length) + ' already done. Straight from the record book.';
  }

  let mode = 'open';
  const fEl = document.getElementById('filters');
  [['open', 'Open'], ['high', 'High priority'], ['all', 'Everything incl. done']].forEach(([key, label]) => {
    const b = document.createElement('button');
    b.className = 'pill' + (key === mode ? ' on' : '');
    b.textContent = label;
    b.onclick = () => { mode = key; render(); [...fEl.children].forEach(x => x.classList.toggle('on', x === b)); };
    fEl.appendChild(b);
  });

  function prioMarkup(t) {
    if (t.st === 'done') return '';
    const p = (t.priority || '').toLowerCase();
    const sym = PRIO_SYMBOL[p] || '·';
    return '<span class="prio' + (p === 'high' ? ' high' : '') + '" title="' + escAttr(t.priority || 'Priority not set') + '">' + sym + '</span>';
  }

  function statusSelect(t) {
    const label = STATUS_LABEL[t.st];
    return '<select class="statusselect ' + t.st + '" data-key="' + escAttr(t.key) + '" aria-label="Status">' +
      STATUS_OPTIONS.map(o => '<option value="' + o + '"' + (o === label ? ' selected' : '') + '>' + o + '</option>').join('') +
      '</select>';
  }

  function render() {
    const tasks = buildTasks();
    updateSummary(tasks);
    const open = tasks.filter(t => t.st !== 'done');
    const high = open.filter(t => (t.priority || '').toLowerCase() === 'high');

    let list = tasks;
    if (mode === 'open') list = open;
    if (mode === 'high') list = high;

    const rooms = {};
    list.forEach(t => { (rooms[t.room] = rooms[t.room] || []).push(t); });

    const el = document.getElementById('rooms');
    el.innerHTML = Object.entries(rooms)
      .sort((a, b) => b[1].length - a[1].length)
      .map(([room, ts]) => {
        ts.sort((a, b) => (PRIO_ORDER[(a.priority || '').toLowerCase()] ?? 4) - (PRIO_ORDER[(b.priority || '').toLowerCase()] ?? 4));
        const title = room === 'general' ? 'General' : room;
        return '<section class="card span-6"><div class="card-head"><h2>' + title + '</h2>' +
          '<span class="card-sub">' + ts.length + '</span></div><ul class="tasklist">' +
          ts.map(t =>
            '<li>' + prioMarkup(t) + '<span' + (t.st === 'done' ? ' style="color:var(--ink-3);text-decoration:line-through"' : '') + '>' +
              t.task + '</span><span class="where">' + statusSelect(t) + '</span></li>'
          ).join('') + '</ul></section>';
      }).join('');
  }
  render();

  document.getElementById('rooms').addEventListener('change', async ev => {
    const sel = ev.target.closest('select.statusselect');
    if (!sel) return;
    const key = sel.dataset.key, status = sel.value;
    if (status === 'Remove' && !confirm('Remove this task?')) { render(); return; }
    if (!hasApi) { say('Backend offline — can\'t save status changes right now.', 'err'); render(); return; }
    try {
      await WAPI.post('/todo-status', { key, status });
      overrides[key] = status;
      render();
      say(status === 'Remove' ? 'Task removed.' : 'Status saved: ' + status + '.', 'ok');
    } catch (e) {
      say('Could not save: ' + e.message, 'err');
      render();
    }
  });
})();
</script>
