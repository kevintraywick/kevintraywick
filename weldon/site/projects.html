<script>
(function () {
  const { D } = W;

  function statusOf(t) {
    const s = (t.status || '').toLowerCase(), p = (t.priority || '').toLowerCase();
    if (s === 'completed' || p === 'done') return 'done';
    if (s === 'in progress') return 'progress';
    if (s === 'blocked') return 'blocked';
    return 'open';
  }
  const BADGE = { done: 'Done', progress: 'In progress', blocked: 'Blocked', open: 'Open' };
  const PRIO_ORDER = { high: 0, medium: 1, low: 2, 'nice to have': 3, '': 4, done: 5 };

  const tasks = D.todo.map(t => ({ ...t, st: statusOf(t), room: t.where || 'general' }));
  const open = tasks.filter(t => t.st !== 'done');
  const high = open.filter(t => (t.priority || '').toLowerCase() === 'high');
  document.getElementById('proj-summary').textContent =
    open.length + ' open, ' + high.length + ' high priority, ' + (tasks.length - open.length) + ' already done. Straight from the record book.';

  let mode = 'open';
  const fEl = document.getElementById('filters');
  [['open', 'Open'], ['high', 'High priority'], ['all', 'Everything incl. done']].forEach(([key, label]) => {
    const b = document.createElement('button');
    b.className = 'pill' + (key === mode ? ' on' : '');
    b.textContent = label;
    b.onclick = () => { mode = key; render(); [...fEl.children].forEach(x => x.classList.toggle('on', x === b)); };
    fEl.appendChild(b);
  });

  function render() {
    let list = tasks;
    if (mode === 'open') list = open;
    if (mode === 'high') list = high;

    const rooms = {};
    list.forEach(t => { (rooms[t.room] = rooms[t.room] || []).push(t); });

    const el = document.getElementById('rooms');
    el.innerHTML = Object.entries(rooms)
      .sort((a, b) => b[1].length - a[1].length)
      .map(([room, ts]) => {
        ts.sort((a, b) => (PRIO_ORDER[(a.priority || '').toLowerCase()] ?? 4) - (PRIO_ORDER[(b.priority || '').toLowerCase()] ?? 4));
        return '<section class="card span-6"><div class="card-head"><h2>' + room + '</h2>' +
          '<span class="card-sub">' + ts.length + '</span></div><ul class="tasklist">' +
          ts.map(t => {
            const p = (t.priority || '').toLowerCase();
            const prio = t.st === 'done' ? '' : '<span class="prio' + (p === 'high' ? ' high' : '') + '">' + (t.priority || '—') + '</span>';
            return '<li>' + prio + '<span' + (t.st === 'done' ? ' style="color:var(--ink-3);text-decoration:line-through"' : '') + '>' +
              t.task + '</span><span class="where"><span class="badge ' + t.st + '">' + BADGE[t.st] + '</span></span></li>';
          }).join('') + '</ul></section>';
      }).join('');
  }
  render();
})();
</script>
<script src="js/footer.js"></script>
